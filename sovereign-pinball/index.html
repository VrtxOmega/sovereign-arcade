<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <title>Sovereign Pinball Space Cadet</title>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
        <style>
            :root {
                --veritas-gold: #D4AF37;
                --veritas-obsidian: #0b0c10;
                --veritas-black: #000000;
                --veritas-gray: #1f2833;
                --neon-glow: 0 0 10px rgba(212, 175, 55, 0.5), 0 0 20px rgba(212, 175, 55, 0.3);
            }
            body, html {
                margin: 0;
                padding: 0;
                width: 100%;
                height: 100%;
                background-color: var(--veritas-black);
                overflow: hidden;
                display: flex;
                flex-direction: column;
                color: var(--veritas-gold);
                font-family: 'Inter', sans-serif;
            }

            /* The core canvas containing the WASM draw calls */
            #canvas {
                max-width: 100%;
                height: calc(100vh - 60px); 
                margin: 0 auto;
                display: block;
                border: 2px solid var(--veritas-gold);
                outline: none;
                
                /* VERITAS RECOLORING MATRIX 
                   This chain converts the rich 90s generic color palette 
                   into pure Black & Veritas Neon Gold. 
                   grayscale(1) removes all color -> sepia(1) tints it brown/gold ->
                   hue-rotate(-10deg) shifts to raw gold -> saturate(4) inflates the gold tone
                   contrast(1.5) deepens the obsidian shadows -> brightness(0.9) mutes glare.
                */
                filter: grayscale(1) sepia(1) hue-rotate(-20deg) saturate(6) contrast(1.8) brightness(0.85) drop-shadow(0 0 25px rgba(212,175,55,0.4));
            }

            .header {
                height: 60px;
                background: linear-gradient(180deg, var(--veritas-gold) 0%, #a68420 100%);
                color: var(--veritas-black);
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 0 30px;
                font-family: 'Outfit', sans-serif;
                box-sizing: border-box;
                border-bottom: 2px solid rgba(255, 255, 255, 0.2);
            }

            .header h1 {
                margin: 0;
                font-size: 24px;
                font-weight: 700;
                display: flex;
                align-items: center;
                gap: 12px;
                letter-spacing: 0.5px;
            }

            .exit-btn {
                background: var(--veritas-black);
                color: var(--veritas-gold);
                border: 1px solid var(--veritas-gold);
                padding: 8px 16px;
                border-radius: 4px;
                font-family: 'Inter', sans-serif;
                font-size: 13px;
                font-weight: 600;
                cursor: pointer;
                text-decoration: none;
                transition: all 0.2s ease;
                display: flex;
                align-items: center;
                gap: 8px;
            }

            .exit-btn:hover {
                background: var(--veritas-gold);
                color: var(--veritas-black);
                box-shadow: var(--neon-glow);
            }

            .pleasewait {
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                font-family: 'Outfit', sans-serif;
                font-size: 32px;
                color: var(--veritas-gold);
                text-shadow: var(--neon-glow);
                animation: pulse 1.5s infinite;
            }

            @keyframes pulse {
                0% { opacity: 0.5; }
                50% { opacity: 1; }
                100% { opacity: 0.5; }
            }

            .controls {
                position: absolute;
                bottom: 20px;
                left: 20px;
                background: rgba(0,0,0,0.8);
                border: 1px solid var(--veritas-gold);
                padding: 15px;
                border-radius: 8px;
                color: rgba(212,175,55,0.8);
                font-size: 12px;
                pointer-events: none;
                font-family: monospace;
            }

        </style>
    </head>
    <body>
        <div class="header">
            <h1>Sovereign Pinball <span style="font-size:14px; font-weight:400; letter-spacing:3px;">/// CADET CORE</span></h1>
            <a href="../index.html" class="exit-btn"><span style="color:#ff3333;">■</span> EXIT TO ARCADE</a>
        </div>

        <div class="pleasewait" id="loader">INJECTING CADET CORE...</div>
        
        <canvas id="canvas"></canvas>

        <div class="controls">
            Z : LEFT FLIPPER | / : RIGHT FLIPPER<br>
            SPACE : LAUNCH BALL | F2 : RESTART<br>
            X : TILT TABLE
        </div>

        <script>
            // Emscripten bindings configuration
            var Module = {
                preRun: [],
                postRun: [function() {
                    document.getElementById("loader").style.display = "none";
                }],
                print: function(text) { console.log(text); },
                printErr: function(text) { console.error(text); },
                canvas: (function() {
                    var canvas = document.getElementById('canvas');
                    canvas.addEventListener("webglcontextlost", function(e) { alert('WebGL context lost. You will need to reload the page.'); e.preventDefault(); }, false);
                    return canvas;
                })(),
                setStatus: function(text) {
                    if (text) console.log("Status: " + text);
                },
                totalDependencies: 0,
                monitorRunDependencies: function(left) {}
            };

            // Fix for the right flipper relying on 'c' in SOME ports instead of the classic '/'
            document.addEventListener("keydown", function(event) {
                if (event.key === "/") {
                    const keyC = new KeyboardEvent("keydown", { key: "c", code: "KeyC", which: 67, keyCode: 67, bubbles: true, cancelable: true });
                    document.getElementById("canvas").dispatchEvent(keyC);
                }
            });
            document.addEventListener("keyup", function(event) {
                if (event.key === "/") {
                    const keyC = new KeyboardEvent("keyup", { key: "c", code: "KeyC", which: 67, keyCode: 67, bubbles: true, cancelable: true });
                    document.getElementById("canvas").dispatchEvent(keyC);
                }
            });

            // Prevent right click menu on canvas
            document.getElementById("canvas").addEventListener("contextmenu", function(event) {
                event.preventDefault();
            });

            // Dynamically load the massive 9MB Space Cadet WebAssembly Payload
            window.addEventListener("load", function() {
                const scriptGame = document.createElement("script");
                scriptGame.src = "3DPinballSpaceCadet.js";
                document.body.appendChild(scriptGame);
            });
        </script>
    </body>
</html>
