<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sovereign Pinball</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #050300;
  --bg-gradient: radial-gradient(circle at 50% 0%, #171000 0%, #050300 80%);
  --gold: #FFD700;
  --gold-glow: rgba(255, 215, 0, 0.4);
  --obsidian: #0A0A0C;
  --text-main: #FFFFFF;
  --text-dim: rgba(255,255,255,0.5);
  --hud-bg: rgba(10, 8, 2, 0.85);
}
* { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
body {
  background: var(--bg); background-image: var(--bg-gradient);
  color: var(--text-main); font-family: 'Inter', sans-serif;
  height: 100vh; overflow: hidden; display: flex;
  justify-content: center; align-items: center;
}
/* Background Elements */
#veritas-watermark {
  position: absolute; inset: 0;
  display: flex; flex-direction: column; justify-content: center; align-items: center;
  z-index: 1; pointer-events: none; opacity: 0.10; color: var(--gold);
}
#veritas-watermark .symbol {
  font-size: 65vh; font-family: 'Playfair Display', serif; line-height: 1; margin-bottom: -20px;
  text-shadow: 0 0 80px rgba(255, 215, 0, 0.3);
}
#veritas-watermark .text {
  font-size: 8vh; font-weight: 900; letter-spacing: 25px;
  text-transform: uppercase; margin-left: 25px;
  text-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
}

/* Layout Container */
.game-container {
  position: relative;
  z-index: 5;
  display: flex;
  gap: 30px;
  align-items: flex-start;
}

/* Game Canvas */
.canvas-wrapper {
  position: relative;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 0 0 2px rgba(255, 215, 0, 0.15), 0 25px 60px rgba(0,0,0,0.8);
  background: rgba(5, 5, 5, 0.8);
  backdrop-filter: blur(10px);
}
#gameCanvas {
  display: block;
  filter: drop-shadow(0 0 6px var(--gold-glow)) drop-shadow(0 0 2px var(--gold));
}

/* UI Panel */
.hud-panel {
  width: 280px;
  background: var(--hud-bg);
  border: 1px solid rgba(255, 215, 0, 0.2);
  border-radius: 12px;
  padding: 30px;
  display: flex; flex-direction: column; gap: 30px;
  box-shadow: 0 15px 40px rgba(0,0,0,0.6);
  backdrop-filter: blur(15px);
}
.hud-section { display: flex; flex-direction: column; gap: 8px; }
.hud-label {
  font-size: 11px; font-weight: 800; letter-spacing: 2px;
  color: var(--gold); opacity: 0.8; text-transform: uppercase;
}
.hud-value {
  font-size: 36px; font-family: 'Playfair Display', serif; font-weight: 700;
  text-shadow: 0 0 15px var(--gold-glow);
}
.hud-multi {
  font-size: 20px; color: #FFF; font-weight: 600;
}

/* Overlays */
.overlay {
  position: absolute; inset: 0; background: rgba(5,3,0,0.85); backdrop-filter: blur(8px);
  display: flex; flex-direction: column; justify-content: center; align-items: center;
  z-index: 20; color: #FFF; text-align: center;
  border-radius: 12px;
}
.overlay.hidden { display: none; }
.overlay-title { font-family: 'Playfair Display', serif; font-size: 48px; font-weight: 700; color: var(--gold); text-shadow: 0 0 30px var(--gold-glow); margin-bottom: 20px; }
.overlay-btn {
  background: transparent; border: 1px solid var(--gold); color: var(--gold);
  padding: 12px 30px; font-size: 14px; font-weight: 600; letter-spacing: 2px;
  border-radius: 4px; cursor: pointer; transition: all 0.2s;
}
.overlay-btn:hover { background: var(--gold); color: #000; box-shadow: 0 0 20px var(--gold-glow); }
.overlay-instructions { margin-top: 30px; font-size: 14px; color: var(--text-dim); line-height: 1.6; }
.key-hint { display: inline-block; background: rgba(255,255,255,0.1); padding: 2px 6px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.2); color: #FFF; }
</style>
</head>
<body>

<div id="veritas-watermark">
  <div class="symbol">Ω</div>
  <div class="text">VERITAS</div>
</div>

<div class="game-container">
  <!-- Interactive Pinball Field Segment -->
  <div class="canvas-wrapper">
    <canvas id="gameCanvas" width="500" height="800"></canvas>
    
    <div id="startOverlay" class="overlay">
      <div class="overlay-title">SOVEREIGN PINBALL</div>
      <button class="overlay-btn" id="btnStart">INSERT PROTOCOL</button>
      <div class="overlay-instructions">
        <span class="key-hint">Left/Right Arrow</span> Flippers<br>
        <span class="key-hint">Down Arrow (Hold & Release)</span> Plunger<br>
      </div>
    </div>
    
    <div id="gameOverOverlay" class="overlay hidden">
      <div class="overlay-title">SIGNAL LOST</div>
      <div style="font-size: 20px; font-weight: 600; margin-bottom: 20px;">Score: <span id="finalScore" style="color:var(--gold);">0</span></div>
      <button class="overlay-btn" id="btnRestart">REBOOT SEQUENCE</button>
    </div>
  </div>

  <div class="hud-panel">
    <div class="hud-section">
      <div class="hud-label">Current Score</div>
      <div class="hud-value" id="uiScore">0</div>
    </div>
    <div class="hud-section">
      <div class="hud-label">Sovereign Data Cores</div>
      <div class="hud-value" id="uiBalls">3</div>
    </div>
    <div class="hud-section">
      <div class="hud-label">Multiplier</div>
      <div class="hud-multi" id="uiMulti">1x</div>
    </div>
  </div>
</div>

<script src="matter.min.js"></script>
<script src="game.js"></script>
</body>
</html>
